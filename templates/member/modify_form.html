<!-- 회원수정 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    {% include 'include/title.html' %}

    <link href="{{ url_for('static', filename='css/common.css')}}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/member.css')}}" rel="stylesheet">

    <script src="{{ url_for('static', filename='js/member.js')}}"></script>
</head>
<body>

    {% include 'include/header.html' %}
    {% include 'include/nav.html' %}

    <article id="modify_wrap">

        <div class="modify_form">
            <form action="/member/modify_confirm" method="post" name="modify_form">
                <input class="" name="mId" value="{{ member.mId }}"  readonly disabled>
                <br>
                <input class="" type="text" name="mName" value="{{ member.mName }}"  readonly disabled>
                <br>
                <input class="" type="password" name="mPw" value="{{ member.mPw }}" placeholder="비밀번호">
                <br>
                <input class="" type="email" name="mMail" value="{{ member.mMail }}" placeholder="이메일">
                <br>
                <input class="" type="text" name="mPhone" value="{{ member.mPhone }}" placeholder="전화번호">
                <br>
                <input class="" type="button" value="정보수정" onclick="modifyForm();">
                <input class="" type="reset" value="초기화">
                
            </form>
        </div>

    </article>

    {% include 'include/footer.html' %}

</body>
</html>
